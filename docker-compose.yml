version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ims-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ims-redis
    ports:
      - "6379:6379"

  # 3. RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ims-rabbitmq
    ports:
      - "5672:5672" # Queue port
      - "15672:15672" # Management UI port
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. FastAPI Backend (NEW)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ims_db
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # 5. PostgreSQL Incident Worker
  postgres-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims-postgres-worker
    command: [ "python", "-m", "workers.postgres_worker" ]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ims_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # 6. MongoDB Data Lake Worker
  mongodb-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims-mongodb-worker
    command: [ "python", "-m", "workers.mongodb_worker" ]
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # 7. React/Vite Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ims-frontend
    ports:
      - "5137:80"
    depends_on:
      - api

volumes:
  pgdata:

prometheus:
  image: prom/prometheus
  container_name: ims-prometheus
  volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
  ports:
    - "9090:9090"

grafana:
  image: grafana/grafana
  container_name: ims-grafana
  ports:
    - "3000:3000"
  environment:
    - GF_SECURITY_ADMIN_PASSWORD=admin
